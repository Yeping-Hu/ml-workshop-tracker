# Monthly: checks every URL in the data files and keeps ONE consolidated
# "broken links" issue up to date.
name: Link check

on:
  schedule:
    - cron: '7 7 7 * *' # 7th of each month, 07:07 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-concurrency 4 --accept '200..=299,403,429' 'data/**/*.yml' 'README.md'
          output: lychee-report.md
          fail: false
      - name: Create/update the consolidated issue
        uses: actions/github-script@v9
        env:
          EXIT_CODE: ${{ steps.lychee.outputs.exit_code }}
        with:
          script: |
            const fs = require('fs');
            const broken = process.env.EXIT_CODE !== '0';
            const report = fs.existsSync('lychee-report.md')
              ? fs.readFileSync('lychee-report.md', 'utf8').slice(0, 60000)
              : '';
            const title = 'Data health: broken links';
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'data-health',
              per_page: 100,
            });
            const existing = open.find((i) => i.title === title);
            if (!broken) {
              if (existing) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: 'closed',
                });
              }
              return;
            }
            const body = `Some URLs in the data files appear broken. Fix or remove them:\n\n${report}\n\n_Updated automatically by the monthly link-check workflow._`;
            if (existing) {
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['data-health'] });
            }
