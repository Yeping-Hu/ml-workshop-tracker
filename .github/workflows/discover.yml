# Weekly: discover newly announced workshop venues on OpenReview for the
# current and next year, backfill deadlines that organizers published late,
# and open ONE PR with whatever appeared. This is how new conference cycles
# (e.g. the NeurIPS list each July) flow in with zero manual work.
name: Discover new workshop venues

on:
  schedule:
    - cron: '19 3 * * 2' # Tuesdays 03:19 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Discover venues (current + next year, all conferences)
        run: |
          Y=$(date -u +%Y)
          for c in icml iclr neurips icra iros cvpr corl colm; do
            for y in "$Y" "$((Y + 1))"; do
              node scripts/discover_openreview.mjs --conf "$c" --year "$y" || true
              sleep 2
            done
          done
      - name: Validate
        run: node scripts/validate.mjs
      # Validation passed above — publish directly. A failed validation fails
      # the job before anything is committed (GitHub emails the owner).
      - name: Publish new/updated entries (if any)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain data/workshops)" ]; then
            echo "No new or updated workshops this week."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/workshops
          git commit -m "data: weekly OpenReview discovery (auto-published after validation)"
          git push
          # Pushes made with GITHUB_TOKEN don't trigger on:push workflows,
          # so kick the deploy explicitly.
          gh workflow run deploy.yml --ref main
