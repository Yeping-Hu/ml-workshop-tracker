# Conference edition dates. `end` drives workshop status: an entry with no
# submission_deadline and no workshop_date is shown as "Past" once its
# conference edition ends (resolved in lib/workshops.mjs; years missing here
# fall back to the coarser `typical_month` in data/conferences.yml).
#
# Add a row when a new edition's dates are announced — `node
# scripts/validate.mjs` prints a note for tracked years that lack one.
# `start` and `source` are optional but encouraged for provenance.

